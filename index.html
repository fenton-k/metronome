<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critter-tronome 🐷</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="/metronome/favicon.ico">
</head>
<body>
    <div class="container">
        <h1><span id="titleEmoji">🐷</span> <span id="titleText">Pigtronome</span></h1>

        <div class="critter" id="critter" role="img" aria-label="Critter">🐷</div>

        <div class="beat-dots" id="beatDots" aria-hidden="true"></div>

        <div id="bpmDisplay" aria-live="polite">120</div>
        <div class="bpm-label">BPM</div>
        <div class="tempo-label" id="tempoLabel">Allegro</div>

        <div class="bpm-controls">
            <button class="bpm-btn secondary" id="bpmDown" aria-label="Decrease BPM">&minus;</button>
            <input type="range" id="bpm" min="40" max="240" value="120" aria-label="Beats per minute">
            <button class="bpm-btn secondary" id="bpmUp" aria-label="Increase BPM">+</button>
        </div>

        <div class="row">
            <div class="field">
                <label for="soundSelect">Sound</label>
                <select id="soundSelect"></select>
            </div>
            <div class="field">
                <label for="timeSig">Time Sig</label>
                <select id="timeSig">
                    <option value="1">1/4</option>
                    <option value="2">2/4</option>
                    <option value="3">3/4</option>
                    <option value="4" selected>4/4</option>
                    <option value="6">6/8</option>
                </select>
            </div>
            <!-- <div class="field" style="visibility: hidden;">
                <label for="volume">Volume</label>
                <input type="range" id="volume" min="0" max="100" value="70" style="width:120px" aria-label="Volume">
            </div> -->
        </div>

        <div class="row">
            <button id="startBtn">&#9654; Start</button>
            <button class="secondary" id="tapBtn">Tap Tempo</button>
        </div>

        <div class="hint">
            Tip: Press <b>Space</b> to start/stop &bull; <b>T</b> to tap tempo &bull; <b>&larr; &rarr;</b> to adjust BPM
        </div>
    </div>

    <script src="sounds.js"></script>
    <script src="app.js"></script>
</body>
</html>
